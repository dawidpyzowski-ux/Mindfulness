<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chwila Oddechu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        
        <header class="app-header">
            <div class="status-bar-spacer"></div>
        </header>

        <main class="app-content">
            
            <section id="page-thought" class="page active">
                <div class="quote-card-wrapper">
                    <h1 class="welcome-text">Witaj w Twojej chwili spokoju.</h1>
                    
                    <div class="quote-interaction-row">
                        <div class="zentangle-icon">
                            <svg viewBox="0 0 100 100" class="zentangle-svg">
                                <circle cx="50" cy="50" r="48" stroke="#A78BFA" stroke-width="2" fill="none"/>
                                <path d="M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z" fill="#A78BFA"/>
                                <path d="M50 25 L55 45 L75 50 L55 55 L50 75 L45 55 L25 50 L45 45 Z" fill="#FEE2E2"/>
                            </svg>
                        </div>
                        <button class="fav-star-btn" id="fav-btn" onclick="toggleFavorite()">
                            <svg viewBox="0 0 24 24" class="star-icon">
                                <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/>
                            </svg>
                        </button>
                    </div>

                    <p class="instruction-text" id="instruction-display">Kliknij przycisk, aby wylosować myśl...</p>
                    <p class="quote-text" id="quote-display"></p>
                    <p class="quote-author" id="author-display"></p>
                    
                    <button class="btn btn-primary" onclick="draw()">Losuj myśl</button>
                    <p class="secondary-instruction">Zatrzymaj się</p>
                </div>

                <div class="reflection-card">
                    <label class="reflection-label">Twoja refleksja:</label>
                    <textarea id="ref-input" placeholder="Co o tym myślisz?"></textarea>
                    <button class="btn btn-secondary" onclick="saveReflection()">Zapisz w dzienniku</button>
                </div>
            </section>

            <section id="page-favorites" class="page">
                <h2 class="page-title">Ulubione</h2>
                <div class="list-container" id="favs-list">
                    </div>
            </section>

            <section id="page-journal" class="page">
                <h2 class="page-title">Dziennik</h2>
                <div class="list-container" id="journal-list">
                    </div>
            </section>

        </main>

        <nav class="app-nav">
            <button id="nav-thought" class="active" onclick="showPage('thought')">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                Myśl
            </button>
            <button id="nav-favorites" onclick="showPage('favorites')">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Ulubione
            </button>
            <button id="nav-journal" onclick="showPage('journal')">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M3 13h18c.55 0 1-.45 1-1s-.45-1-1-1H3c-.55 0-1 .45-1 1s.45 1 1 1zm0 4h12c.55 0 1-.45 1-1s-.45-1-1-1H3c-.55 0-1 .45-1 1s.45 1 1 1zm0-8h18c.55 0 1-.45 1-1s-.45-1-1-1H3c-.55 0-1 .45-1 1s.45 1 1 1zm0-4h18c.55 0 1-.45 1-1s-.45-1-1-1H3c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg>
                Dziennik
            </button>
        </nav>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
